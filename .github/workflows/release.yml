# Crucible CI/CD Pipeline
# Builds an AppImage on tag push (e.g. v1.0.0)
# Build logs are public for transparency and auditability.

name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  APPIMAGE_NAME: Crucible-x86_64.AppImage

jobs:
  build:
    name: Build AppImage
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq wget file patchelf icoutils binutils libfuse2t64

      - name: Install Python dependencies
        run: |
          python -m venv .venv
          . .venv/bin/activate
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Build AppImage via project script
        run: ./build.sh

      - name: Generate checksum
        run: |
          sha256sum "$APPIMAGE_NAME" > SHA256SUMS
          cat SHA256SUMS

      - name: Upload build artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: release-assets
          path: |
            ${{ env.APPIMAGE_NAME }}
            SHA256SUMS

  release:
    name: Create Release
    runs-on: ubuntu-24.04
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: release-assets

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65
        with:
          name: "Crucible ${{ github.ref_name }}"
          body: |
            ## Crucible ${{ github.ref_name }}

            ### Verification
            ```bash
            sha256sum -c SHA256SUMS
            ```

            Build workflow: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          files: |
            ${{ env.APPIMAGE_NAME }}
            SHA256SUMS
